<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片转拼豆图纸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex}
.panel{width:320px;min-width:320px;background:#16213e;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:100vh}
.panel h1{font-size:1.2em;text-align:center;color:#e94560}
.upload-zone{border:2px dashed #555;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.2s;background:#0f3460}
.upload-zone:hover,.upload-zone.drag{border-color:#e94560;background:#1a3a6e}
.upload-zone .icon{font-size:2em}
.upload-zone .hint{font-size:.75em;color:#888;margin-top:4px}
.upload-zone img{max-width:100%;max-height:100px;border-radius:8px;margin-top:8px}
.param-group{background:#0f3460;border-radius:8px;padding:10px}
.param-group label{display:flex;justify-content:space-between;align-items:center;font-size:.82em;margin-bottom:4px}
.param-group label span.val{color:#e94560;font-weight:bold;min-width:26px;text-align:right}
.param-group input[type=range]{width:100%;accent-color:#e94560}
.aspect-row{display:flex;align-items:center;gap:8px;font-size:.78em;margin-top:4px}
.aspect-row input[type=checkbox]{accent-color:#e94560}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.btn{flex:1;min-width:70px;padding:8px 10px;border:none;border-radius:8px;cursor:pointer;font-size:.8em;font-weight:bold;transition:.15s;text-align:center}
.btn.primary{background:#e94560;color:#fff}
.btn.primary:hover{background:#ff6b81}
.btn.secondary{background:#0f3460;color:#ccc;border:1px solid #444}
.btn.secondary:hover{background:#1a4a80}
.btn.outline{background:transparent;color:#e94560;border:1px solid #e94560}
.btn.outline:hover{background:#e9456020}
.btn.active{background:#e94560!important;color:#fff!important}
.btn.warn{background:#f0a040;color:#000}
.btn.warn:hover{background:#f5c060}
.btn.danger{background:#a04040;color:#fff}
.btn.danger:hover{background:#c06060}
.btn.green{background:#32a852;color:#fff}
.btn.green:hover{background:#40c860}
.preview-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:auto}
.preview-area .empty{color:#555;font-size:1.1em;text-align:center}
.preview-area canvas{border:1px solid #333;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.5);max-width:95vw;max-height:60vh;cursor:default}
.preview-area canvas.editing{cursor:crosshair}
.legend{display:flex;flex-wrap:wrap;gap:3px;margin-top:10px;max-width:800px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72em;background:#0f3460;padding:3px 7px;border-radius:4px;cursor:pointer;user-select:none}
.legend-item:hover{background:#1a4a80}
.legend-item.bg-marked{opacity:.3;text-decoration:line-through}
.legend-item .swatch{width:13px;height:13px;border-radius:2px;border:1px solid #444}
.legend-item .count{color:#aaa}
.info-bar{font-size:.75em;color:#888;margin-top:4px;text-align:center}
.tool-sep{width:1px;background:#333;margin:0 4px}
@media(max-width:700px){body{flex-direction:column}.panel{width:100%;min-width:auto;max-height:none}}
</style>
</head>
<body>

<div class="panel">
  <h1>🧶 拼豆图纸生成器</h1>

  <div class="upload-zone" id="uploadZone">
    <div class="icon">📁</div>
    <div>点击或拖拽上传图片</div>
    <div class="hint">支持 JPG / PNG / GIF / WebP</div>
    <img id="thumb" style="display:none">
  </div>
  <input type="file" id="fileInput" accept="image/*" hidden>

  <div class="param-group">
    <label>宽度（颗） <span class="val" id="wVal">40</span></label>
    <input type="range" id="gridW" min="8" max="120" value="40">
    <label>高度（颗） <span class="val" id="hVal">40</span></label>
    <input type="range" id="gridH" min="8" max="120" value="40">
    <div class="aspect-row">
      <input type="checkbox" id="lockAspect" checked> 锁定比例
      <span style="margin-left:auto">颜色 <span class="val" id="cVal">20</span></span>
    </div>
    <input type="range" id="numColors" min="4" max="60" value="20" style="margin-top:4px">
    <label style="margin-top:6px">杂色清理 <span class="val" id="clVal">30</span></label>
    <input type="range" id="cleanLevel" min="0" max="60" value="30">
  </div>

  <div class="btn-row">
    <button class="btn outline active" id="btnAuto">🤖 自动配色</button>
    <button class="btn outline" id="btnBead">🧶 拼豆色</button>
  </div>

  <div class="btn-row">
    <button class="btn secondary" id="btnEdit">✏️ 编辑模式</button>
    <button class="btn danger" id="btnErase">🧹 擦除</button>
    <button class="btn secondary" id="btnUndo">↩ 撤销</button>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="btnDownload">📥 下载图纸</button>
    <button class="btn green" id="btnShopList">🛒 采购清单</button>
  </div>
  <div class="btn-row">
    <button class="btn secondary" id="btnPrint">🖨️ 打印</button>
    <button class="btn warn" id="btnRemoveBg">🔲 去背景</button>
  </div>

  <div class="info-bar" id="infoBar">请先上传图片</div>
  <div class="info-bar" id="editHint" style="color:#f0a040;display:none">编辑模式：点击格子换色 | 右键/擦除模式删除格子</div>
</div>

<div class="preview-area" id="previewArea">
  <div class="empty">
    <div style="font-size:4em">🧶</div>
    <div>上传图片后在此预览</div>
  </div>
</div>

<script>
// ═══════════ 拼豆标准色板 ═══════════
const BEAD_COLORS = [
  {name:"白色", hex:"#FFFFFF"},{name:"黑色", hex:"#1E1E1E"},{name:"灰色", hex:"#969696"},
  {name:"深灰", hex:"#5A5A5A"},{name:"浅棕", hex:"#C8AA8C"},{name:"棕色", hex:"#96643C"},
  {name:"深棕", hex:"#643C1E"},{name:"红色", hex:"#DC2828"},{name:"深红", hex:"#A01414"},
  {name:"粉色", hex:"#FF96B4"},{name:"浅粉", hex:"#FFC8DC"},{name:"橙色", hex:"#FF8C00"},
  {name:"黄色", hex:"#FFDC1E"},{name:"浅黄", hex:"#FFF596"},{name:"绿色", hex:"#32B432"},
  {name:"深绿", hex:"#147814"},{name:"浅绿", hex:"#96DC96"},{name:"青色", hex:"#32C8C8"},
  {name:"蓝色", hex:"#2864DC"},{name:"浅蓝", hex:"#96BEF0"},{name:"深蓝", hex:"#14328C"},
  {name:"紫色", hex:"#9632C8"},{name:"浅紫", hex:"#C8A0E6"},{name:"品红", hex:"#DC3296"},
  {name:"肤色", hex:"#FFD2AA"},{name:"金色", hex:"#FFC800"},{name:"银色", hex:"#C0C0C0"},
];

// ═══════════ 全局状态 ═══════════
const $=id=>document.getElementById(id);
let sourceImg=null, aspectRatio=1, currentPalette=null, paletteMode='auto';
let gridData=null; // {w,h,indices:Uint8Array,palette:[[r,g,b],...],names:[],cell}
let editMode=false, eraseMode=false, editColor=null;
let editHistory=[], bgRemovalSnapshot=null;
let bgMarkedColors=new Set(); // colors marked as background

// ═══════════ DOM refs ═══════════
const uploadZone=$('uploadZone'),fileInput=$('fileInput'),thumb=$('thumb');
const previewArea=$('previewArea'),infoBar=$('infoBar'),editHint=$('editHint');
const gridW=$('gridW'),gridH=$('gridH'),lockAspect=$('lockAspect');
const numColors=$('numColors'),cleanLevel=$('cleanLevel');

// ═══════════ 上传 ═══════════
uploadZone.addEventListener('click',()=>fileInput.click());
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('drag')});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop',e=>{
  e.preventDefault();uploadZone.classList.remove('drag');
  const f=e.dataTransfer.files[0];if(f) loadImage(f);
});
fileInput.addEventListener('change',()=>{const f=fileInput.files[0];if(f) loadImage(f)});

function loadImage(file){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      sourceImg=img;aspectRatio=img.width/img.height;
      thumb.src=e.target.result;thumb.style.display='block';
      if(lockAspect.checked){gridH.value=Math.max(8,Math.round(gridW.value/aspectRatio));$('hVal').textContent=gridH.value}
      editHistory=[];bgRemovalSnapshot=null;bgMarkedColors.clear();
      exitEditMode();render();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

// ═══════════ 滑块 ═══════════
[gridW,gridH,numColors,cleanLevel].forEach(s=>{
  s.addEventListener('input',()=>{
    $('wVal').textContent=gridW.value;$('hVal').textContent=gridH.value;
    $('cVal').textContent=numColors.value;$('clVal').textContent=cleanLevel.value;
    if(lockAspect.checked&&(s===gridW||s===gridH)){
      if(s===gridW){gridH.value=Math.max(8,Math.round(gridW.value/aspectRatio));$('hVal').textContent=gridH.value}
      else{gridW.value=Math.max(8,Math.round(gridH.value*aspectRatio));$('wVal').textContent=gridW.value}
    }
    render();
  });
});
lockAspect.addEventListener('change',()=>{
  if(lockAspect.checked&&sourceImg){gridH.value=Math.max(8,Math.round(gridW.value/aspectRatio));$('hVal').textContent=gridH.value;render()}
});

// ═══════════ 色板按钮 ═══════════
function setPaletteMode(mode){
  paletteMode=mode;
  currentPalette=(mode==='bead')?BEAD_COLORS:null;
  ['btnAuto','btnBead'].forEach(id=>$(id).classList.remove('active'));
  if(mode==='auto')$('btnAuto').classList.add('active');
  else $('btnBead').classList.add('active');
  if(sourceImg) render();
}
$('btnAuto').addEventListener('click',()=>setPaletteMode('auto'));
$('btnBead').addEventListener('click',()=>setPaletteMode('bead'));

// ═══════════ 编辑/擦除/撤销 ═══════════
function exitEditMode(){
  editMode=false;eraseMode=false;editColor=null;
  $('btnEdit').classList.remove('active');$('btnErase').classList.remove('active');
  editHint.style.display='none';
  const c=previewArea.querySelector('canvas');if(c)c.classList.remove('editing');
}
$('btnEdit').addEventListener('click',()=>{
  if(!gridData)return;
  editMode=!editMode;eraseMode=false;
  $('btnEdit').classList.toggle('active',editMode);
  $('btnErase').classList.remove('active');
  editHint.style.display=editMode?'block':'none';
  const c=previewArea.querySelector('canvas');if(c)c.classList.toggle('editing',editMode);
});
$('btnErase').addEventListener('click',()=>{
  if(!gridData)return;
  eraseMode=!eraseMode;editMode=false;
  $('btnErase').classList.toggle('active',eraseMode);
  $('btnEdit').classList.remove('active');
  editHint.style.display=eraseMode?'block':'none';
  const c=previewArea.querySelector('canvas');if(c)c.classList.toggle('editing',eraseMode);
});
$('btnUndo').addEventListener('click',()=>{
  if(!editHistory.length) return;
  const snap=editHistory.pop();
  gridData.indices=snap.indices;
  gridData.counts=snap.counts;
  gridData.bgCells=snap.bgCells||new Set();
  drawPreview();
});
$('btnRemoveBg').addEventListener('click',()=>{
  if(!gridData) return;
  saveSnapshot();
  removeBackground();
  drawPreview();
});

// ═══════════ 快照 ═══════════
function saveSnapshot(){
  if(!gridData)return;
  editHistory.push({
    indices:new Uint8Array(gridData.indices),
    counts:[...gridData.counts],
    bgCells:new Set(gridData.bgCells||[])
  });
  if(editHistory.length>50) editHistory.shift();
}

// ═══════════ 核心算法 ═══════════
function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]}

function closest(rgb,palette){
  let best=0,bestD=Infinity;
  for(let i=0;i<palette.length;i++){
    const d=(rgb[0]-palette[i][0])**2+(rgb[1]-palette[i][1])**2+(rgb[2]-palette[i][2])**2;
    if(d<bestD){bestD=d;best=i}
  }
  return best;
}

function dominantColor(imgData,x0,y0,x1,y1){
  // 提取区域内主导色（出现频率最高的）
  const hist={};
  let maxCount=0, bestRgb=[0,0,0];
  for(let y=y0;y<y1;y++){
    for(let x=x0;x<x1;x++){
      const i=(y*imgData.width+x)*4;
      const key=`${imgData.data[i]},${imgData.data[i+1]},${imgData.data[i+2]}`;
      hist[key]=(hist[key]||0)+1;
      if(hist[key]>maxCount){maxCount=hist[key];bestRgb=[imgData.data[i],imgData.data[i+1],imgData.data[i+2]]}
    }
  }
  return bestRgb;
}

function quantize(pixels,k){
  const data=pixels.map(p=>[p[0],p[1],p[2]]);
  const step=Math.max(1,Math.floor(data.length/k));
  let centers=[];
  for(let i=0;i<k;i++) centers.push([...data[Math.min(i*step,data.length-1)]]);
  for(let iter=0;iter<12;iter++){
    const buckets=Array.from({length:k},()=>[]);
    for(const p of data){
      let best=0,bestD=Infinity;
      for(let i=0;i<k;i++){const d=(p[0]-centers[i][0])**2+(p[1]-centers[i][1])**2+(p[2]-centers[i][2])**2;if(d<bestD){bestD=d;best=i}}
      buckets[best].push(p);
    }
    let changed=false;
    for(let i=0;i<k;i++){
      if(!buckets[i].length) continue;
      const avg=[0,0,0];for(const p of buckets[i]){avg[0]+=p[0];avg[1]+=p[1];avg[2]+=p[2]}
      avg[0]=Math.round(avg[0]/buckets[i].length);avg[1]=Math.round(avg[1]/buckets[i].length);avg[2]=Math.round(avg[2]/buckets[i].length);
      if(avg[0]!==centers[i][0]||avg[1]!==centers[i][1]||avg[2]!==centers[i][2]) changed=true;
      centers[i]=avg;
    }
    if(!changed)break;
  }
  return centers;
}

function cleanNoise(indices,w,h,threshold){
  // BFS 连通区域合并：小区域被相邻大区域吸收
  const visited=new Uint8Array(w*h);
  const result=new Uint8Array(indices);
  const level=threshold/100*80+5; // 5-85 range

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      if(visited[y*w+x]) continue;
      const colorIdx=result[y*w+x];
      // BFS
      const region=[];const queue=[[x,y]];
      visited[y*w+x]=1;
      while(queue.length){
        const[cx,cy]=queue.shift();
        region.push([cx,cy]);
        for(const[dx,dy] of[[0,1],[1,0],[0,-1],[-1,0]]){
          const nx=cx+dx,ny=cy+dy;
          if(nx>=0&&nx<w&&ny>=0&&ny<h&&!visited[ny*w+nx]&&result[ny*w+nx]===colorIdx){
            visited[ny*w+nx]=1;queue.push([nx,ny]);
          }
        }
      }
      // 小区域：找最多的邻居颜色
      if(region.length<=level){
        const neighborColors={};
        for(const[cx,cy] of region){
          for(const[dx,dy] of[[0,1],[1,0],[0,-1],[-1,0]]){
            const nx=cx+dx,ny=cy+dy;
            if(nx>=0&&nx<w&&ny>=0&&ny<h&&result[ny*w+nx]!==colorIdx){
              const nc=result[ny*w+nx];
              neighborColors[nc]=(neighborColors[nc]||0)+1;
            }
          }
        }
        let bestC=colorIdx,bestN=0;
        for(const[c,n]of Object.entries(neighborColors)){if(n>bestN){bestN=n;bestC=parseInt(c)}}
        if(bestN>0) for(const[cx,cy] of region) result[cy*w+cx]=bestC;
      }
    }
  }
  return result;
}

function removeBackground(){
  if(!gridData) return;
  const {indices,w,h}=gridData;
  // 边界洪水填充：从四边出发，标记与边界相连的同色区域为背景
  const bg=new Set();
  const visited=new Uint8Array(w*h);
  // 从四边出发
  for(let x=0;x<w;x++){bg.add(indices[x]);bg.add(indices[(h-1)*w+x])}
  for(let y=0;y<h;y++){bg.add(indices[y*w]);bg.add(indices[y*w+w-1])}

  bgMarkedColors=new Set(bg);
  gridData.bgCells=new Set();

  for(const colorIdx of bg){
    // 洪水填充：找所有与边界直接连通且颜色相同的格子
    const queue=[];
    for(let x=0;x<w;x++){
      if(!visited[x]&&indices[x]===colorIdx){queue.push([x,0]);visited[x]=1}
      if(!visited[(h-1)*w+x]&&indices[(h-1)*w+x]===colorIdx){queue.push([x,h-1]);visited[(h-1)*w+x]=1}
    }
    for(let y=1;y<h-1;y++){
      if(!visited[y*w]&&indices[y*w]===colorIdx){queue.push([0,y]);visited[y*w]=1}
      if(!visited[y*w+w-1]&&indices[y*w+w-1]===colorIdx){queue.push([w-1,y]);visited[y*w+w-1]=1}
    }
    while(queue.length){
      const[cx,cy]=queue.shift();
      gridData.bgCells.add(cy*w+cx);
      for(const[dx,dy] of[[0,1],[1,0],[0,-1],[-1,0]]){
        const nx=cx+dx,ny=cy+dy;
        if(nx>=0&&nx<w&&ny>=0&&ny<h&&!visited[ny*w+nx]&&indices[ny*w+nx]===colorIdx){
          visited[ny*w+nx]=1;queue.push([nx,ny]);
        }
      }
    }
  }
  // 重算计数
  const counts=new Array(gridData.palette.length).fill(0);
  for(let i=0;i<indices.length;i++){if(!gridData.bgCells.has(i)) counts[indices[i]]++}
  gridData.counts=counts;
}

// ═══════════ 渲染 ═══════════
function render(){
  if(!sourceImg) return;
  const w=parseInt(gridW.value),h=parseInt(gridH.value);
  const k=parseInt(numColors.value);
  const cellSz=Math.max(8,Math.min(40,800/Math.max(w,h)));
  const cleanThreshold=parseInt(cleanLevel.value);

  // 1. 缩放图片到适中尺寸，每格取主导色
  const sampleScale=Math.max(2,Math.ceil(800/sourceImg.width)); // 每个格子至少2px采样
  const sw=Math.min(sourceImg.width,w*sampleScale),sh=Math.min(sourceImg.height,h*sampleScale);
  const tmp=document.createElement('canvas');
  tmp.width=sw;tmp.height=sh;
  const tctx=tmp.getContext('2d');
  tctx.drawImage(sourceImg,0,0,sw,sh);
  const imgData=tctx.getImageData(0,0,sw,sh);

  const cellW=sw/w,cellH=sh/h;
  const pixels=[];
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const x0=Math.floor(x*cellW),y0=Math.floor(y*cellH);
      const x1=Math.max(x0+1,Math.floor((x+1)*cellW)),y1=Math.max(y0+1,Math.floor((y+1)*cellH));
      // 区域内主导色
      const hist={};let maxC=0, best=[0,0,0];
      for(let py=y0;py<y1;py++){
        for(let px=x0;px<x1;px++){
          const i=(py*sw+px)*4;
          const k2=`${imgData.data[i]},${imgData.data[i+1]},${imgData.data[i+2]}`;
          hist[k2]=(hist[k2]||0)+1;
          if(hist[k2]>maxC){maxC=hist[k2];best=[imgData.data[i],imgData.data[i+1],imgData.data[i+2]]}
        }
      }
      pixels.push(best);
    }
  }

  // 2. 颜色量化
  let rgbPalette,names;
  if(currentPalette){
    rgbPalette=currentPalette.map(c=>hexToRgb(c.hex));
    names=currentPalette.map(c=>c.name);
  }else{
    rgbPalette=quantize(pixels,Math.min(k,pixels.length));
    names=rgbPalette.map((_,i)=>`C${i+1}`);
  }
  // 亮度排序
  const ranked=rgbPalette.map((c,i)=>[i,c[0]*0.299+c[1]*0.587+c[2]*0.114]);
  ranked.sort((a,b)=>a[1]-b[1]);
  const sortedIdx=ranked.map(x=>x[0]);
  rgbPalette=sortedIdx.map(i=>rgbPalette[i]);
  names=sortedIdx.map(i=>names[i]);

  // 3. 颜色映射
  let indices=new Uint8Array(w*h);
  for(let i=0;i<pixels.length;i++) indices[i]=closest(pixels[i],rgbPalette);

  // 4. 杂色清理
  if(cleanThreshold>0) indices=cleanNoise(indices,w,h,cleanThreshold);

  // 5. 计数
  const counts=new Array(rgbPalette.length).fill(0);
  for(const idx of indices) counts[idx]++;

  // 6. 存数据
  gridData={w,h,indices,palette:rgbPalette,names,counts,cell:cellSz,bgCells:new Set(),rawPalette:rgbPalette};
  bgMarkedColors.clear();editHistory=[];bgRemovalSnapshot=null;

  drawPreview();
}

function drawPreview(){
  if(!gridData) return;
  const {w,h,indices,palette,counts,cell,bgCells}=gridData;

  const canvas=document.createElement('canvas');
  canvas.width=w*cell;canvas.height=h*cell;
  canvas.style.cursor=editMode||eraseMode?'crosshair':'default';
  const ctx=canvas.getContext('2d');

  ctx.fillStyle='#e8e8e8';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 色块
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const idx=indices[y*w+x];
      const isBg=bgCells?.has(y*w+x);
      const [r,g,b]=palette[idx];
      if(isBg){ctx.fillStyle=`rgba(${r},${g},${b},0.3)`}
      else{ctx.fillStyle=`rgb(${r},${g},${b})`}
      ctx.fillRect(x*cell,y*cell,cell-1,cell-1);
    }
  }

  // 网格线
  for(let y=0;y<=h;y++){
    const thick=y%10===0?2:0.5;
    ctx.strokeStyle=y%10===0?'#999':'#ccc';
    ctx.lineWidth=thick;
    ctx.beginPath();ctx.moveTo(0,y*cell);ctx.lineTo(w*cell,y*cell);ctx.stroke();
  }
  for(let x=0;x<=w;x++){
    const thick=x%10===0?2:0.5;
    ctx.strokeStyle=x%10===0?'#999':'#ccc';
    ctx.lineWidth=thick;
    ctx.beginPath();ctx.moveTo(x*cell,0);ctx.lineTo(x*cell,h*cell);ctx.stroke();
  }

  // 点击事件 — 编辑/擦除
  canvas.addEventListener('click',e=>{
    if(!editMode&&!eraseMode) return;
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;
    const gx=Math.floor((e.clientX-rect.left)*scaleX/cell);
    const gy=Math.floor((e.clientY-rect.top)*scaleY/cell);
    if(gx<0||gx>=w||gy<0||gy>=h) return;

    const idx=gy*w+gx;
    if(eraseMode){
      saveSnapshot();
      const oldColor=gridData.indices[idx];
      gridData.bgCells.add(idx);
      gridData.counts[oldColor]=Math.max(0,(gridData.counts[oldColor]||0)-1);
    }else if(editMode&&editColor!==null){
      saveSnapshot();
      const oldColor=gridData.indices[idx];
      gridData.indices[idx]=editColor;
      gridData.bgCells.delete(idx);
      gridData.counts[oldColor]=Math.max(0,(gridData.counts[oldColor]||0)-1);
      gridData.counts[editColor]=(gridData.counts[editColor]||0)+1;
    }
    drawPreview();
  });

  // 图例 — 点击选编辑颜色或标记背景
  let legendHTML='';
  const total=counts.reduce((a,b)=>a+b,0);
  const bgTotal=bgCells?.size||0;
  for(let i=0;i<palette.length;i++){
    if(counts[i]===0) continue;
    const [r,g,b]=palette[i];
    const hex=`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
    const isBg=bgMarkedColors.has(i);
    legendHTML+=`<div class="legend-item${isBg?' bg-marked':''}" data-color-idx="${i}" title="左键选色 | 右键标记背景">
      <div class="swatch" style="background:${hex}"></div>
      ${names[i]} <span class="count">×${counts[i]}</span>
    </div>`;
  }

  previewArea.innerHTML='';
  previewArea.appendChild(canvas);
  const legendDiv=document.createElement('div');
  legendDiv.className='legend';
  legendDiv.innerHTML=legendHTML;
  // 图例交互
  legendDiv.querySelectorAll('.legend-item').forEach(item=>{
    item.addEventListener('click',e=>{
      const colorIdx=parseInt(item.dataset.colorIdx);
      if(editMode){
        editColor=colorIdx;
        const [r,g,b]=gridData.palette[colorIdx];
        $('btnEdit').style.background=`rgb(${r},${g},${b})`;
      }
    });
    item.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const colorIdx=parseInt(item.dataset.colorIdx);
      if(bgMarkedColors.has(colorIdx)) bgMarkedColors.delete(colorIdx);
      else bgMarkedColors.add(colorIdx);
      // Undo bg标记 — 重新做背景移除
      saveSnapshot();
      gridData.bgCells.clear();
      for(const ci of bgMarkedColors){
        for(let i=0;i<gridData.indices.length;i++){
          if(gridData.indices[i]===ci) gridData.bgCells.add(i);
        }
      }
      const counts=new Array(gridData.palette.length).fill(0);
      for(let i=0;i<gridData.indices.length;i++){if(!gridData.bgCells.has(i)) counts[gridData.indices[i]]++}
      gridData.counts=counts;
      drawPreview();
    });
  });
  previewArea.appendChild(legendDiv);

  infoBar.textContent=`${w}×${h}格 | ${palette.length}色 | 共${total-bgTotal}颗${bgTotal?' (背景'+bgTotal+'颗)':''}`;
}

// ═══════════ 下载 ═══════════
$('btnDownload').addEventListener('click',()=>{
  const canvas=previewArea.querySelector('canvas');
  if(!canvas) return;
  const link=document.createElement('a');
  link.download='拼豆图纸.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
});

// ═══════════ 采购清单 ═══════════
$('btnShopList').addEventListener('click',()=>{
  if(!gridData) return;
  const {palette,names,counts,w,h,bgCells}=gridData;
  const total=counts.reduce((a,b)=>a+b,0)-(bgCells?.size||0);
  // 生成采购清单图片
  const itemH=32,width=400;
  const activeColors=palette.map((_,i)=>i).filter(i=>counts[i]>0&&!bgMarkedColors.has(i));
  const height=activeColors.length*itemH+120;
  const c=document.createElement('canvas');
  c.width=width;c.height=height;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,width,height);
  ctx.fillStyle='#1a1a2e';ctx.font='bold 18px Microsoft YaHei';ctx.textAlign='center';
  ctx.fillText('拼豆采购清单',width/2,36);
  ctx.font='13px Microsoft YaHei';ctx.fillStyle='#666';
  ctx.fillText(`${w}×${h}格 | ${activeColors.length}色 | 共${total}颗`,width/2,60);

  activeColors.forEach((colorIdx,i)=>{
    const y=80+i*itemH;
    const [r,g,b]=palette[colorIdx];
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(20,y+2,28,28);
    ctx.strokeStyle='#ccc';ctx.strokeRect(20,y+2,28,28);
    ctx.fillStyle='#333';ctx.font='14px Microsoft YaHei';ctx.textAlign='left';
    ctx.fillText(names[colorIdx],60,y+14);
    ctx.fillText(`× ${counts[colorIdx]} 颗`,60,y+30);
    // 进度条
    const pct=counts[colorIdx]/total;
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(160,y+8,pct*200,10);
    ctx.fillStyle='#999';ctx.font='11px Microsoft YaHei';ctx.textAlign='right';
    ctx.fillText(Math.round(pct*100)+'%',370,y+24);
  });

  const link=document.createElement('a');
  link.download='拼豆采购清单.png';
  link.href=c.toDataURL('image/png');
  link.click();
});

// ═══════════ 打印 ═══════════
$('btnPrint').addEventListener('click',()=>{
  const canvas=previewArea.querySelector('canvas');
  if(!canvas) return;
  const w=window.open('','_blank','width=900,height=700');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>拼豆图纸</title>
    <style>body{text-align:center;font-family:'Microsoft YaHei',sans-serif;margin:20px}
    img{max-width:100%;border:1px solid #ccc}@media print{body{margin:0}img{max-width:100%;page-break-inside:avoid}}
    h2{color:#e94560}</style></head><body>
    <h2>🧶 拼豆图纸</h2>
    <p>${gridW.value}×${gridH.value} | ${numColors.value}色 | 共 ${parseInt(gridW.value)*parseInt(gridH.value)} 颗</p>
    <img src="${canvas.toDataURL()}"><br><button onclick="window.print()" style="margin:12px;padding:8px 24px;font-size:16px;cursor:pointer">🖨️ 打印</button>
    </body></html>`);
  w.document.close();
});

// ═══════════ 快捷键 ═══════════
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();$('btnDownload').click()}
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();$('btnUndo').click()}
  if(e.key==='Escape'){e.preventDefault();exitEditMode()}
});
</script>
</body>
</html>
